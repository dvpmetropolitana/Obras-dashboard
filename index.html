<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obras 2026 — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #0D2137;
  --blue:    #1A5FA8;
  --blue-lt: #2E80D8;
  --steel:   #3C5A78;
  --bg:      #0A1929;
  --surface: #0F2840;
  --surface2:#152F4A;
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #E8F1FA;
  --muted:   #7A9AB8;
  --green:   #1DB87A;
  --green-bg:#0D2E1E;
  --yellow:  #F0A30A;
  --yellow-bg:#2A200A;
  --orange:  #E8701A;
  --orange-bg:#2A1608;
  --red:     #E24B4A;
  --red-bg:  #2A0D0D;
  --accent:  #4EADFF;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Layout ── */
.layout {
  display: grid;
  grid-template-rows: auto auto 1fr;
  min-height: 100vh;
  padding: 20px 24px 16px;
  gap: 16px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 0.5px solid var(--border2);
  padding-bottom: 14px;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-icon {
  width: 38px; height: 38px;
  background: var(--blue);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.brand-title { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.brand-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.clock { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--accent); letter-spacing: 1px; }
.date-str { font-size: 12px; color: var(--muted); text-align: right; }
.refresh-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 8px;
  border: 0.5px solid var(--border2);
  background: var(--surface2); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.15s;
}
.refresh-btn:hover { background: var(--blue); color: var(--text); border-color: var(--blue-lt); }
.refresh-btn svg { width: 14px; height: 14px; }

/* ── Metrics ── */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.metric {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.metric::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--blue);
}
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.metric-value { font-size: 32px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 4px; }
.metric-sub { font-size: 12px; color: var(--muted); }
.metric.green::before { background: var(--green); }
.metric.yellow::before { background: var(--yellow); }
.metric.red::before { background: var(--red); }

/* ── Tabs ── */
.tabs-bar {
  display: flex;
  gap: 4px;
  border-bottom: 0.5px solid var(--border);
  padding-bottom: 0;
  margin-bottom: -1px;
}
.tab-btn {
  padding: 9px 18px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--muted); background: transparent;
  border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 7px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.tab-btn.active .tab-dot { background: var(--accent); }

/* ── Content ── */
.content-area { overflow: hidden; }
.tab-panel { display: none; height: 100%; }
.tab-panel.active { display: block; }

/* ── Table card ── */
.tcard {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-top: 14px;
}
.tcard-header {
  padding: 11px 16px;
  background: var(--surface2);
  border-bottom: 0.5px solid var(--border);
  font-size: 13px; font-weight: 500; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.tcard-header-icon { font-size: 15px; color: var(--accent); }
.tcard-count {
  margin-left: auto;
  font-size: 11px; color: var(--muted);
  background: var(--bg);
  padding: 2px 8px; border-radius: 99px;
  border: 0.5px solid var(--border);
}

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 9px 12px;
  font-size: 11px; font-weight: 500; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
  border-bottom: 0.5px solid var(--border);
  text-align: left; white-space: nowrap;
  background: var(--surface2);
}
tbody td {
  padding: 9px 12px;
  border-bottom: 0.5px solid var(--border);
  color: var(--text); font-size: 13px;
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface2); }

/* ── Section separator (rutas) ── */
.ruta-sep td {
  background: var(--steel) !important;
  color: #fff !important;
  font-weight: 600 !important;
  font-size: 12px !important;
  letter-spacing: 0.5px;
  padding: 7px 12px !important;
}

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500; padding: 3px 9px;
  border-radius: 99px; white-space: nowrap;
}
.badge-green  { background: var(--green-bg);  color: var(--green);  }
.badge-red    { background: var(--red-bg);    color: var(--red);    }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
.badge-blue   { background: rgba(78,173,255,0.12); color: var(--accent); }

/* ── Progress bar ── */
.bar-wrap { display: flex; align-items: center; gap: 9px; min-width: 150px; }
.bar-track {
  flex: 1; height: 6px;
  background: rgba(255,255,255,0.07);
  border-radius: 99px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 99px; }
.bar-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); min-width: 34px; text-align: right; }

/* ── Loading / error ── */
.loading-msg { padding: 2rem; text-align: center; color: var(--muted); font-size: 14px; }
.error-msg {
  margin: 1rem; padding: 12px 16px;
  background: var(--red-bg); color: var(--red);
  border-radius: 8px; border: 0.5px solid rgba(226,75,74,0.3);
  font-size: 13px;
}
.update-line {
  text-align: right; font-size: 11px; color: var(--muted);
  margin-top: 10px; font-family: 'DM Mono', monospace;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin 0.6s linear infinite; }
</style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-icon">🏗️</div>
      <div>
        <div class="brand-title">Obras 2026</div>
        <div class="brand-sub">Dirección de Obras — Estado y avance</div>
      </div>
    </div>
    <div class="header-right">
      <div>
        <div class="clock" id="clock">--:--</div>
        <div class="date-str" id="datestr">--</div>
      </div>
      <button class="refresh-btn" onclick="loadAll()" id="refresh-btn">
        <svg id="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Actualizar
      </button>
    </div>
  </header>

  <!-- Metrics -->
  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-label">Cargando...</div><div class="metric-value">—</div></div>
    <div class="metric"><div class="metric-label">Cargando...</div><div class="metric-value">—</div></div>
    <div class="metric"><div class="metric-label">Cargando...</div><div class="metric-value">—</div></div>
    <div class="metric"><div class="metric-label">Cargando...</div><div class="metric-value">—</div></div>
  </div>

  <!-- Tabs + content -->
  <div style="display:flex;flex-direction:column;overflow:hidden;">
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="showTab('terminados',this)">
        <span class="tab-dot"></span> Terminados
      </button>
      <button class="tab-btn" onclick="showTab('metro',this)">
        <span class="tab-dot"></span> Área Metropolitana
      </button>
      <button class="tab-btn" onclick="showTab('rutas',this)">
        <span class="tab-dot"></span> RP 57 y 63
      </button>
    </div>

    <div class="content-area">
      <div id="terminados" class="tab-panel active">
        <div class="loading-msg">Cargando datos...</div>
      </div>
      <div id="metro" class="tab-panel">
        <div class="loading-msg">Cargando datos...</div>
      </div>
      <div id="rutas" class="tab-panel">
        <div class="loading-msg">Cargando datos...</div>
      </div>
    </div>

    <div class="update-line" id="update-line"></div>
  </div>
</div>

<script>
const URLS = {
  terminados: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-Cy1gHNylNZFz4Lz8u9ZwfNsJW8BwLngea4UwVmlvjYplYuWUyjX2HDYJ094O6g/pub?gid=1852596772&single=true&output=csv',
  metro:      'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-Cy1gHNylNZFz4Lz8u9ZwfNsJW8BwLngea4UwVmlvjYplYuWUyjX2HDYJ094O6g/pub?gid=1895583428&single=true&output=csv',
  rutas:      'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-Cy1gHNylNZFz4Lz8u9ZwfNsJW8BwLngea4UwVmlvjYplYuWUyjX2HDYJ094O6g/pub?gid=984773082&single=true&output=csv'
};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const cells = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    cells.push(cur.trim());
    return cells;
  });
}

async function fetchCSV(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('No se pudo cargar la planilla (HTTP ' + r.status + ')');
  return parseCSV(await r.text());
}

function fmtDate(v) {
  if (!v) return '';
  const s = String(v).trim();
  if (!s || s === '-') return '—';
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3] + '/' + m[2] + '/' + m[1];
  return s;
}

function barHTML(rawVal) {
  let p = 0;
  if (rawVal !== null && rawVal !== undefined && rawVal !== '') {
    const s = String(rawVal).trim();
    // Si es el texto de barra con bloques █, extraer el número del final
    const blockMatch = s.match(/(\d+)%\s*$/);
    if (blockMatch) {
      p = parseInt(blockMatch[1]) / 100;
    } else if (s.endsWith('%')) {
      p = parseFloat(s) / 100;
    } else {
      p = parseFloat(s);
      if (p > 1) p = p / 100;
    }
  }
  p = Math.min(Math.max(p || 0, 0), 1);
  let color;
  if (p >= 1)        color = '#1DB87A';
  else if (p >= 0.5) color = '#F0A30A';
  else if (p > 0)    color = '#E8701A';
  else               color = '#E24B4A';
  const pct = Math.round(p * 100);
  return `<div class="bar-wrap">
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="bar-pct">${pct}%</span>
  </div>`;
}

function estadoBadge(v) {
  if (!v) return '';
  const s = String(v).trim();
  if (s.includes('🟢')) return '<span class="badge badge-green">✔ Completo</span>';
  if (s.includes('🔴')) return '<span class="badge badge-red">✖ Suspendido</span>';
  if (s.toLowerCase().includes('curso')) return '<span class="badge badge-yellow">↻ En curso</span>';
  return `<span class="badge badge-blue">${s}</span>`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadAll() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');
  try {
    const [termRows, metroRows, rutasRows] = await Promise.all([
      fetchCSV(URLS.terminados),
      fetchCSV(URLS.metro),
      fetchCSV(URLS.rutas)
    ]);
    renderMetrics(termRows, metroRows, rutasRows);
    renderTerminados(termRows);
    renderMetro(metroRows);
    renderRutas(rutasRows);
    const now = new Date();
    document.getElementById('update-line').textContent =
      'Última actualización: ' +
      now.toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'}) +
      ' · ' + now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    ['terminados','metro','rutas'].forEach(id => {
      document.getElementById(id).innerHTML =
        `<div class="error-msg">⚠ ${e.message}</div>`;
    });
  } finally {
    icon.classList.remove('spinning');
  }
}

function renderMetrics(termRows, metroRows, rutasRows) {
  const terms = termRows.slice(2).filter(r => r[1] && r[1].trim());
  const completados = terms.filter(r => String(r[7]||'').includes('🟢')).length;
  const suspendidos = terms.filter(r => String(r[7]||'').includes('🔴')).length;

  const metro = metroRows.slice(2).filter(r => r[1] && r[1].trim());
  const rutas = rutasRows.filter(r => {
    const f = String(r[0]||'').trim();
    return f && !f.includes('RUTA PROVINCIAL') && f !== 'TAREA' &&
           f !== 'TAREA PENDIENTE' && !f.includes('OBRAS PENDIENTES') && !f.includes('🛣');
  });

  const pctMetro = metro.map(r => parseFloat(r[7]||0)).filter(v => !isNaN(v) && v >= 0 && v <= 1);
  const pctRutas = rutas.map(r => parseFloat(r[3]||0)).filter(v => !isNaN(v) && v >= 0 && v <= 1);
  const allPct = [...pctMetro, ...pctRutas];
  const avg = allPct.length ? Math.round(allPct.reduce((a,b)=>a+b,0)/allPct.length*100) : 0;
  const enCurso = allPct.filter(v => v > 0 && v < 1).length;

  document.getElementById('metrics').innerHTML = `
    <div class="metric green">
      <div class="metric-label">Terminadas</div>
      <div class="metric-value">${terms.length}</div>
      <div class="metric-sub">${completados} completas · ${suspendidos} suspendidas</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pendientes Metro</div>
      <div class="metric-value">${metro.length}</div>
      <div class="metric-sub">${metro.filter(r=>parseFloat(r[7]||0)===0).length} sin iniciar</div>
    </div>
    <div class="metric">
      <div class="metric-label">Pendientes Rutas</div>
      <div class="metric-value">${rutas.length}</div>
      <div class="metric-sub">${rutas.filter(r=>parseFloat(r[3]||0)===0).length} sin iniciar</div>
    </div>
    <div class="metric yellow">
      <div class="metric-label">Avance promedio</div>
      <div class="metric-value">${avg}%</div>
      <div class="metric-sub">${enCurso} en curso</div>
    </div>`;
}

function renderTerminados(rows) {
  const data = rows.slice(2).filter(r => r[1] && r[1].trim());
  if (!data.length) { document.getElementById('terminados').innerHTML = '<div class="loading-msg">Sin datos</div>'; return; }
  const trs = data.map(r => {
    // Estado en col 7 (emoji), Fin en col 8 (fecha o texto como "Suspendido")
    const estado = r[7] || '';
    const fin = r[8] || '';
    const finDisplay = String(fin).toLowerCase().includes('suspendido') ? '' : fmtDate(fin);
    return `<tr>
      <td style="max-width:340px;font-size:14px">${esc(r[1])}</td>
      <td>${estadoBadge(estado)}</td>
      <td style="white-space:nowrap">${finDisplay}</td>
    </tr>`;
  }).join('');
  document.getElementById('terminados').innerHTML = `
    <div class="tcard">
      <div class="tcard-header">
        <span class="tcard-header-icon">✅</span> Obras terminadas 2026
        <span class="tcard-count">${data.length} registros</span>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Tarea</th><th>Estado</th><th>Fin</th></tr></thead>
        <tbody>${trs}</tbody>
      </table></div>
    </div>`;
}

function renderMetro(rows) {
  const data = rows.slice(2).filter(r => r[1] && r[1].trim());
  if (!data.length) { document.getElementById('metro').innerHTML = '<div class="loading-msg">Sin datos</div>'; return; }
  const trs = data.map(r => `<tr>
    <td style="white-space:nowrap">${fmtDate(r[0])}</td>
    <td style="max-width:280px;font-size:14px">${esc(r[1])}</td>
    <td style="white-space:nowrap">${fmtDate(r[6])}</td>
    <td>${barHTML(r[8])}</td>
    <td style="white-space:nowrap">${fmtDate(r[9])}</td>
  </tr>`).join('');
  document.getElementById('metro').innerHTML = `
    <div class="tcard">
      <div class="tcard-header">
        <span class="tcard-header-icon">📍</span> Pendientes — Área Metropolitana
        <span class="tcard-count">${data.length} registros</span>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Fecha</th><th>Tarea</th><th>Inicio</th><th style="min-width:170px">Avance</th><th>Fin</th></tr></thead>
        <tbody>${trs}</tbody>
      </table></div>
    </div>`;
}

function renderRutas(rows) {
  let html = '';
  let currentRuta = '';
  let tableRows = '';
  let hasRows = false;
  let count = 0;

  function closeTable() {
    if (hasRows) {
      html += `<div class="tcard" style="margin-top:14px">
        <div class="tcard-header">
          <span class="tcard-header-icon">🛣️</span> ${esc(currentRuta)}
          <span class="tcard-count">${count} registros</span>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Tarea</th><th>Descripción</th><th style="min-width:170px">Avance</th><th>Fin</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table></div></div>`;
      tableRows = ''; hasRows = false; count = 0;
    }
  }

  rows.forEach(r => {
    const f = String(r[0]||'').trim();
    if (!f) return;
    if (f.startsWith('RUTA PROVINCIAL') || (f.includes('RUTA') && f.includes('🛣'))) {
      closeTable();
      currentRuta = f.replace(/🛣️|🛣/g,'').trim();
      return;
    }
    if (f === 'TAREA' || f === 'TAREA PENDIENTE' || f.includes('OBRAS PENDIENTES')) return;
    tableRows += `<tr>
      <td style="max-width:220px">${esc(r[0])}</td>
      <td style="max-width:220px;color:var(--muted)">${esc(r[1])}</td>
      <td>${barHTML(r[4])}</td>
      <td style="white-space:nowrap">${fmtDate(r[5])}</td>
    </tr>`;
    hasRows = true; count++;
  });
  closeTable();

  document.getElementById('rutas').innerHTML = html || '<div class="loading-msg">Sin datos</div>';
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('datestr').textContent =
    now.toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}
updateClock();
setInterval(updateClock, 1000);

// Load data
loadAll();
</script>
</body>
</html>
